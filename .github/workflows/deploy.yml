name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── D1 Database ────────────────────────────────────────────────────────
      - name: Ensure D1 database exists
        run: |
          DB_JSON=$(npx wrangler d1 list --json 2>/dev/null || echo '[]')
          DB_ID=$(echo "$DB_JSON" | jq -r '.[] | select(.name == "templates-db") | .uuid' || echo '')

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "Creating D1 database templates-db..."
            npx wrangler d1 create templates-db
            DB_JSON=$(npx wrangler d1 list --json)
            DB_ID=$(echo "$DB_JSON" | jq -r '.[] | select(.name == "templates-db") | .uuid')
          fi

          echo "D1 database ID: $DB_ID"
          # Inject the real ID into wrangler.jsonc before build
          sed -i "s/REPLACE_WITH_YOUR_D1_ID/$DB_ID/g" wrangler.jsonc

      - name: Apply D1 schema
        # CREATE TABLE IF NOT EXISTS + INSERT OR IGNORE make this safe to run every deploy
        run: npx wrangler d1 execute templates-db --file=schema.sql --remote

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build for Cloudflare Workers
        run: npm run build:cf

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy worker
        run: npx wrangler deploy

      # ── Secrets ───────────────────────────────────────────────────────────
      # Runs after deploy so the worker exists in Cloudflare.
      # Uses printf to avoid a trailing newline in secret values.
      - name: Set worker secrets
        run: |
          printf '%s' "${{ secrets.ADMIN_PASSWORD }}"       | npx wrangler secret put ADMIN_PASSWORD
          printf '%s' "${{ secrets.ADMIN_SESSION_SECRET }}" | npx wrangler secret put ADMIN_SESSION_SECRET
          printf '%s' "${{ secrets.SMTP_USER }}"            | npx wrangler secret put SMTP_USER
          printf '%s' "${{ secrets.SMTP_PASS }}"            | npx wrangler secret put SMTP_PASS
